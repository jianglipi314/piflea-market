<!doctype html>
<html lang=zh-CN>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width, initial-scale=1.0>
  <title>支付测试 - 派二手市场</title>
  <script src=https://sdk.minepi.com/pi-sdk.js></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif;max-width:460px;margin:0 auto;padding:40px 20px;background:#f4f5f9;color:#333}
    .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.08);text-align:center}
    h1{margin:0 0 10px;color:#ff5533;font-size:22px}
    p{color:#666;line-height:1.6;margin:12px 0}
    button{background:linear-gradient(135deg,#ff5533,#ff8f3f);color:#fff;border:none;border-radius:999px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;width:100%}
    button:disabled{background:#ccc;cursor:not-allowed}
    .status{margin-top:20px;padding:12px;border-radius:10px;font-size:14px;display:none}
    .status.success{background:#d4edda;color:#155724}
    .status.error{background:#f8d7da;color:#721c24}
    .status.info{background:#d1ecf1;color:#0c5460}
  </style>
</head>
<body>
  <div class=card>
    <h1>派二手市场</h1>
    <p>支付功能测试页面</p>
    <p>点击下方按钮完成一笔 0.01 π 的测试支付。</p>
    <button id=payBtn onclick=startPayment()>支付 0.01 π</button>
    <div id=status class=status></div>
  </div>
  <script>
    const API = 'https://piflea-backend.vercel.app';

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      el.style.display = 'block';
    }

    function initPi() {
      if (!window.Pi) {
        showStatus('请在 Pi Browser 中打开', 'error');
        return;
      }
      // 沙箱模式：可通过 URL 参数 ?sandbox=false 强制主网
      // 默认行为：本地开发/GitHub Pages 走测试网，否则走主网
      const urlParams = new URLSearchParams(location.search);
      const forceSandbox = urlParams.get('sandbox');
      const isSandbox = forceSandbox !== null
        ? forceSandbox !== 'false'
        : location.hostname.includes('github.io') || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      window.Pi.init({ version: '2.0', sandbox: isSandbox })
        .then(() => showStatus('SDK 就绪，准备测试', 'info'))
        .catch(e => showStatus('SDK 失败: ' + e.message, 'error'));
    }

    async function startPayment() {
      if (!window.Pi) { showStatus('Pi 不可用', 'error'); return; }

      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = '支付中...';

      const paymentData = {
        amount: 0.01,
        memo: '派二手市场支付测试',
        metadata: { test: 1, app: 'piflea-market' },
        uid: 'test-' + Date.now()
      };

      const callbacks = {
        onReadyForServerApproval: async function (id) {
          showStatus('正在请求服务器...', 'info');
          try {
            await fetch(API + '/api/approve', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId: id })
            });
            showStatus('服务器确认完成', 'info');
          } catch (e) {
            showStatus('确认失败: ' + e.message, 'error');
          }
        },
        onReadyForServerCompletion: async function (id, tx) {
          showStatus('支付成功，完成中...', 'info');
          try {
            await fetch(API + '/api/complete', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId: id, txid: tx })
            });
            showStatus('支付完成! TxID: ' + tx, 'success');
            btn.textContent = '支付成功';
          } catch (e) {
            showStatus('完成失败: ' + e.message, 'error');
          }
        },
        onCancel: function (id) {
          showStatus('支付取消', 'error');
          btn.disabled = false;
          btn.textContent = '支付 0.01 π';
        },
        onError: function (err, payment) {
          showStatus('支付失败: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = '支付 0.01 π';
        }
      };

      try {
        await window.Pi.createPayment(paymentData, callbacks);
      } catch (e) {
        showStatus('创建支付失败: ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = '支付 0.01 π';
      }
    }

    initPi();
  </script>
</body>
</html>
